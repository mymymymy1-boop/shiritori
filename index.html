<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>お受験しりとりアンチグラビティ</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

    <!-- UI レイヤー -->
    <div id="ui-layer">

        <!-- ヘッダーとお題エリア（上部固定） -->
        <div id="top-area">
            <h1 class="logo">しりとり アンチグラビティ🚀</h1>
            <div id="target-container">
                <div class="target-label">さいしょの言葉は：</div>
                <!-- ここに現在のお題の画像とひらがなが入る -->
                <div id="target-card">
                    <img id="target-image" src="" alt="お題画像" style="display: none;">
                    <div id="target-name">？？？</div>
                </div>
                <!-- 次に探す頭文字のヒント -->
                <div class="hint-label">つぎは「<span id="target-kana-hint" class="highlight-kana">？</span>」からさがしてね！</div>
            </div>
            <div id="score-board">スコア: <span id="score-value">0</span></div>
        </div>

        <!-- 判定・フィードバックアニメーション用レイヤー -->
        <div id="feedback-overlay" class="hidden">
            <div id="feedback-mark"></div>
            <div id="feedback-text"></div>
        </div>

        <!-- 開始ボタン -->
        <div id="start-screen">
            <div class="start-modal">
                <h2>お受験しりとり<br>アンチグラビティ</h2>
                <p>ふってくるイラストから<br>しりとりが続くものをえらんでね！</p>
                <button id="start-btn">スタート！</button>
            </div>
        </div>
    </div>

    <!-- 降ってくる選択肢の物理描画キャンバス -->
    <canvas id="game-canvas"></canvas>

    <script src="script.js"></script>
</body>

</html>
